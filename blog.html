---
layout: default
title: 文章列表
---
<div class="container py-5">
  <h1 class="fw-bold mb-5">所有文章</h1>
  <div class="row">

    {% for post in posts %}
    <div class="col-md-8 offset-md-2 mb-4">
      <div class="d-md-flex align-items-center">
        
        <div class="flex-grow-1">
          <h3 class="fw-bold"><a href="{{ post.url | relative_url }}" class="text-dark text-decoration-none">{{ post.title }}</a></h3>
          <p class="text-muted">{{ post.excerpt | strip_html | truncate: 150 }}</p>
        </div>

        <div class="ms-md-4 text-muted">
          {{ post.date | date: "%b %d" }}
        </div>
        
      </div>
      <hr class="my-4 text-secondary opacity-25">
    </div>
    {% endfor %}
  </div>
</div>
