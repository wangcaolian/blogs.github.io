---
layout: default
title: 全部文章
---
<div class="container">
  <ul class="list-unstyled">

    <!-- 核心代码：这才是“递归” posts 文件夹的操作 -->
    {% for post in site.posts %}
      <li class="mb-5">
        <div class="row">

          <div class="col-md-2 text-muted">
            {{ post.date | date: "%Y-%m-%d" }}
          </div>

          <div class="col-md-10">
            <h3 class="fw-bold">
              <a href="{{ post.url | relative_url }}" class="text-dark text-decoration-none">
                {{ post.title }}
              </a>
            </h3>
            <!-- 显示摘要 -->
            <p class="text-muted">{{ post.excerpt | strip_html | truncate: 200 }}</p>
            <a href="{{ post.url | relative_url }}" class="btn btn-link p-0">继续阅读 →</a>
          </div>
          
        </div>
        <hr class="my-4">
      </li>
    {% endfor %}
  </ul>
</div>
