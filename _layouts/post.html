---

layout: default

---


<!-- 这里的 layout: default 表示 post 布局会嵌套在 default 布局里面 -->
<!-- 这样你的博客文章也会自带导航栏和页脚 -->

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <article class="blog-post">

        <!-- 文章标题 -->
        <h1 class="display-5 fw-bold mb-3">{{ page.title }}</h1>
        
        <!-- 文章元数据（日期） -->
        <p class="text-muted mb-4">
          发布于 {{ page.date | date: "%Y年%m月%d日" }}
        </p>

        <hr class="my-5">

        <!-- 文章正文内容 -->
        <div class="content lh-lg">
          {{ content }}
        </div>
        
        <div class="mt-5">
            <a href="{{ '/blog' | relative_url }}" class="btn btn-outline-primary"> 返回博客列表 </a>
        </div>
      </article>
    </div>
  </div>
</div>
