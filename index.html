---

layout: default
title: 首页

---

<!-- 1. Hero Section: 震撼的第一眼 -->
<div id="saasCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#saasCarousel" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#saasCarousel" data-bs-slide-to="1"></button>
  </div>

  <div class="carousel-inner">
    <!-- Slide 1 -->
    <div class="carousel-item active">
       <!-- 这里放入你的 Hero 内容 -->
       <div class="bg-dark text-white p-5 text-center">
          <h2>学海无涯</h2>
       </div>
    </div>
    
    <!-- Slide 2 -->
    <div class="carousel-item">
       <div class="bg-primary text-white p-5 text-center">
          <h2>回头是岸</h2>
       </div>
    </div>
  </div>
</div>

<!-- 2. Features Section: 循环显示数据 (前面教过的 _data/features.yml) -->
<section class="py-5 bg-light">
  <div class="container">
    <div class="row g-4 text-center">

      {% for item in site.data.features %}
      
      <div class="col-md-4">
        <div class="p-4 bg-white h-100 rounded-4 shadow-sm">
          <i class="bi {{ item.icon }} text-primary fs-1 mb-3"></i>
          <h4 class="fw-bold">{{ item.title }}</h4>
          <p class="text-muted">{{ item.desc }}</p>
        </div>
      </div>

      {% endfor %}
      
    </div>
  </div>
</section>

<!-- 3. Recent Blog Posts: 展示你的博客深度 -->
<section class="py-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <h2 class="fw-bold mb-0">最新深度解析</h2>
      <a href="{{ '/blog' | relative_url}}" class="text-decoration-none">查看全部博客 </a>
    </div>


    <div class="row g-4">
      
      {% for post in site.posts limit:3 %}
      <div class="col-md-4">
        <div class="card h-100 shadow-hover">
          <div class="card-body">
            <small class="text-primary fw-bold">{{ post.date | date: "%Y-%m-%d" }}</small>
            <h5 class="card-title mt-2 fw-bold">{{ post.title }}</h5>
            <p class="card-text text-muted">{{ post.excerpt | strip_html | truncate: 80 }}</p>
            <a href="{{ post.url | relative_url }}" class="stretched-link"></a>
          </div>
        </div>
      </div>
      {% endfor %}

    </div>
  </div>
</section>
